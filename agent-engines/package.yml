matches:
  # === SINGLE-SKILL ===

  # --- ado-gateway: read ---
  - trigger: ";ado-read-wi"
    word: true
    label: "ado-gateway: fetch work item, emit handoff"
    replace: |
      Fetch ADO work item <wi-id> from <org>/<project> and emit the handoff JSON. Do not draft a spec.

  - trigger: ";ado-read-pr"
    word: true
    label: "ado-gateway: parse PR URL, emit pr-comments handoff"
    replace: |
      Parse this ADO PR URL and return the normalized pr-comments handoff: <url>

  - trigger: ";ado-read-wi-pr"
    word: true
    label: "ado-gateway: fetch work item + linked PR comments, emit handoff envelope"
    replace: |
      Fetch ADO work item <wi-id> plus the linked PR comments. Emit the work-item-plus-pr-comments handoff envelope only.

  # --- ado-gateway: write ---
  - trigger: ";ado-write-dry"
    word: true
    label: "ado-gateway: create work item dry-run"
    replace: |
      Create an ADO work item titled "<title>" under <org>/<project>, type=User Story, area=<path>. Dry-run only. Do not pass --confirm.

  - trigger: ";ado-write-confirm"
    word: true
    label: "ado-gateway: execute previous dry-run with --confirm"
    replace: |
      Execute the previous dry-run with --confirm. Stop if validation fails.

  # --- spec-engine ---
  - trigger: ";spec-from-handoff"
    word: true
    label: "spec-engine: produce spec from ado-gateway handoff JSON"
    replace: |
      Consume this ado-gateway handoff JSON and produce an implementation-ready spec. Risk tier required. GIVEN/WHEN/THEN acceptance criteria. IN/OUT scope explicit. Open questions with owner.
      <paste handoff>

  - trigger: ";spec-from-request"
    word: true
    label: "spec-engine: turn freeform request into spec"
    replace: |
      Turn this request into a spec: "<request>". Risk tier required. Surface any conflicting requirements as open questions — do not resolve by assumption.

  # --- delivery-engine ---
  - trigger: ";plan"
    word: true
    label: "delivery-engine: break spec into atomic vertical slices"
    replace: |
      Break this confirmed spec into atomic vertical slices. Each task: S|M|L estimate, estimate_reliability, depends_on, done_when. Identify the critical path. Surface unknowns as U-01…
      <paste spec>

  # --- code-quality-engine ---
  - trigger: ";review"
    word: true
    label: "code-quality-engine: review file for correctness, maintainability, modernization"
    replace: |
      Review <file-path> for correctness, maintainability, and modernization. Findings sorted by severity. Patch plan in safe order. Residual risk listed. No perf changes without profiling data.

  - trigger: ";refactor"
    word: true
    label: "code-quality-engine: refactor with minimal mutation"
    replace: |
      Refactor <function-name>() with minimal mutation. Confirm current behavior first, then propose the smallest safe change.

  # --- test-engine ---
  - trigger: ";tests-plan"
    word: true
    label: "test-engine: design test plan"
    replace: |
      Design a test plan for the discount calculator. Lowest-cost level that proves behavior. Happy path + edge cases + failure modes in GIVEN/WHEN/THEN. List coverage gaps explicitly.

  - trigger: ";tests-e2e"
    word: true
    label: "test-engine: add Playwright E2E for checkout"
    replace: |
      Add Playwright E2E for checkout. Control timing, data, selectors. If staging is unavailable, mark E2E blocked with re-enable condition — do not fabricate passing tests.

  # --- ops-engine ---
  - trigger: ";ops-ci"
    word: true
    label: "ops-engine: review GitHub Actions workflow"
    replace: |
      Review this GitHub Actions workflow for CI/CD reproducibility, secrets hygiene, and rollback. Risks before plan. Every destructive step needs a rollback artifact. Stop for approval before any prod step.
      <paste yaml>

  - trigger: ";ops-threat"
    word: true
    label: "ops-engine: threat-model deployment path"
    replace: |
      Threat-model the deployment path for payment-svc. Abort the plan if you find unacceptable risk without a mitigation path.

  # --- doc-engine ---
  - trigger: ";doc-readme"
    word: true
    label: "doc-engine: write README for orders service"
    replace: |
      Write a README for the orders service. Audience: new contributor onboarding in <2 hours. Verify every command and path before including. Structure first, prose after.

  - trigger: ";doc-adr"
    word: true
    label: "doc-engine: capture architectural decision record"
    replace: |
      Capture this as a durable decision record: chose jsonschema over hand-rolled validation. Include context, decision, consequences, alternatives ruled out.

  - trigger: ";doc-agents"
    word: true
    label: "doc-engine: diff-only update to AGENTS.md"
    replace: |
      Diff-only update to AGENTS.md. Do not overwrite — block for approval if a wholesale replacement would be needed.

  # --- repo-engine ---
  - trigger: ";onboard"
    word: true
    label: "repo-engine: map domains, entry points, conventions, hotspots"
    replace: |
      Onboard me into this repo. Map domains, entry points, conventions, hotspots. Flag inaccessible paths explicitly — do not silently skip.

  # --- thinking-engine ---
  - trigger: ";think"
    word: true
    label: "thinking-engine: pressure-test MVP scope"
    replace: |
      Pressure-test this MVP scope. Audit assumptions. Generate 2–3 materially different options. Recommend a path with blind spots and open questions.
      <paste plan>

  - trigger: ";missing"
    word: true
    label: "thinking-engine: surface what is missing"
    replace: |
      What am I missing here? Restate problem with constraints and success bar. If only one option is viable, say so and list ruled-out alternatives.

  # --- caveman ---
  - trigger: ";caveman-full"
    word: true
    label: "caveman: full mode triage"
    replace: |
      /caveman level=full: triage why orders-svc returns 502 intermittently since 14:02

  - trigger: ";caveman-rest"
    word: true
    label: "caveman: caveman mode for the rest of this review"
    replace: |
      Caveman mode for the rest of this review. Drop to lite if anything gets ambiguous.

  # === PIPELINES ===

  - trigger: ";pipe-ticket"
    word: true
    label: "pipeline: full ticket → ship loop"
    replace: |
      1. Fetch ADO work item <wi-id> from <org>/<project>.
      2. Onboard into the repo: map domains, entry points, conventions.
      3. Produce an implementation-ready spec with risk tier and acceptance criteria.
      4. Break the spec into atomic vertical slices with estimates and critical path.
      5. Design a test plan for the changes: happy path, edge cases, failure modes.
      6. Add a work item comment on <wi-id> with the plan summary. Stop before writing code.

  - trigger: ";pipe-review"
    word: true
    label: "pipeline: full review → patch loop"
    replace: |
      1. Review the diff for correctness, maintainability, and security.
      2. Sort findings by severity.
      3. Propose a patch plan in safe apply order.
      4. Design a targeted test plan for any changed behavior.
      5. Surface residual risk before closing.

  - trigger: ";pipe-onboard"
    word: true
    label: "pipeline: onboard → plan → deliver"
    replace: |
      1. Onboard into this repo: map domains, entry points, conventions, hotspots.
      2. Identify the critical path for <feature>.
      3. Produce a delivery plan with atomic vertical slices.
      4. Surface unknowns and dependencies before work begins.
      5. Stop for approval before any write operation.

  - trigger: ";pipe-threat"
    word: true
    label: "pipeline: threat model → remediation plan"
    replace: |
      1. Threat-model the system boundary for <component>.
      2. Identify attack surfaces, trust boundaries, and data flows.
      3. Rank findings by severity and exploitability.
      4. Propose mitigations in priority order.
      5. Abort if any finding is unacceptable without a mitigation path.

  - trigger: ";pipe-doc"
    word: true
    label: "pipeline: spec → doc → ADR"
    replace: |
      1. Consume the confirmed spec for <feature>.
      2. Draft a README for the new component.
      3. Capture the key architectural decision as an ADR.
      4. Diff-only update to AGENTS.md — stop if wholesale replacement is needed.
      5. Surface any inconsistencies between spec and existing docs.

  # === MODIFIERS ===

  - trigger: ";mod-risk"
    word: true
    label: "modifier: elevate risk scrutiny on all outputs"
    replace: |
      Add a risk tier (LOW / MEDIUM / HIGH / CRITICAL) to every output block for the rest of this task. Flag any HIGH or CRITICAL items before proceeding.

  - trigger: ";mod-scope"
    word: true
    label: "modifier: lock scope boundaries"
    replace: |
      Restate the current scope in IN / OUT format and lock it. Reject any request that expands scope without an explicit scope-change acknowledgment.

  - trigger: ";mod-depth"
    word: true
    label: "modifier: increase analysis depth"
    replace: |
      Increase analysis depth for the rest of this task. Surface additional edge cases, adversarial inputs, and second-order effects. Do not compress findings.

  - trigger: ";mod-stop"
    word: true
    label: "modifier: halt and surface all blockers"
    replace: |
      Stop the current pipeline. List every open question, blocker, and assumption that must be resolved before proceeding. Do not continue until I respond.

  - trigger: ";mod-brief"
    word: true
    label: "modifier: compress outputs to decisions and actions only"
    replace: |
      For the rest of this task: decisions and actions only. No background prose. Use bullet lists. Maximum 5 lines per block.

  - trigger: ";mod-dry"
    word: true
    label: "modifier: force dry-run on next write operation"
    replace: |
      Treat the next write operation as a dry-run. Preview the full payload and stop. Do not pass --confirm until I explicitly say "proceed".

  - trigger: ";mod-confirm"
    word: true
    label: "modifier: confirm and execute previous dry-run"
    replace: |
      Execute the previously previewed dry-run with --confirm. Abort if validation fails or if any field differs from the preview.

  - trigger: ";mod-caveman"
    word: true
    label: "modifier: switch to caveman mode"
    replace: |
      Drop to caveman mode for the rest of this task. One command at a time. Confirm output before the next step. Narrate what you observe, not what you expect.
