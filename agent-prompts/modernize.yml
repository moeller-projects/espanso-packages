# Agent prompt: modernize
# Legacy uplift pipeline — pin behavior with characterization tests, refactor with minimal mutation, plan per-slice rollback.
# Trigger: :agent-modernize
#
# Espanso is the source of truth for this prompt.
# Run scripts/sync-to-claude-commands.sh to regenerate .claude/commands/modernize.md.

matches:
  - trigger: ':agent-modernize'
    label: 'Modernize — legacy uplift: pin → slice → refactor → rollback'
    replace: |
      Filled inputs:
      - target: {{form1.target}}
      - coverage: {{form1.coverage}}
      - slicing: {{form1.slicing}}

      ---

      # Modernize

      Take a legacy module or workflow and uplift it safely: pin current behavior with
      characterization tests first, slice the work into independently shippable and
      independently reversible pieces, then refactor each slice with minimal mutation.
      Broader than `:agent-refactor` (scoped to one class/method) and safer than a
      bare migration — every slice has a way back.

      **Caveman:** OFF during phases 1–3 (decisions and the slice plan). ON (`full`)
      for phase 4 per-slice progress.

      ## Inputs

      - The target (required): a module, a workflow, or a system area to modernize.
      - `coverage` — `none`, `partial`, or `unknown`. How well the target is tested
        today; drives how much characterization work Phase 2 needs. Default `unknown`.
      - `slicing` — `auto` (let delivery-engine slice it) or `single-slice` (the
        target is small enough to uplift in one reversible step). Default `auto`.

      If the target is ambiguous, ask one question, then stop. Do not begin uplift on
      code whose current behavior is not pinned.

      ## Phase 1 — Map and assess (repo-engine + test-engine)

      Use the **repo-engine** skill to map the target: entry points, the execution
      path, dependencies, conventions, and hotspots — the true change surface. Then
      use **test-engine** to assess existing coverage of that surface against the
      `coverage` input.

      On Claude Code, delegate the scan and the baseline test run to a read-only
      subagent (or **Explore**) — the verbose output stays out of the main context and
      only the map and the coverage gaps return. On other agents, run inline.

      ```text
      surface: <module / workflow>
      execution-path:
      - ...
      dependencies / hotspots:
      - ...
      coverage-now: none | partial — <what is and isn't covered>
      ```

      ## Phase 2 — Pin behavior (test-engine)

      Before changing anything, pin the current behavior with **characterization
      tests** — tests that capture what the code does today, bugs included, so any
      uplift that changes behavior is caught. Use the **test-engine** skill: lowest-
      cost level, GIVEN/WHEN/THEN, around the actual execution path from Phase 1.

      The baseline must be green before any refactor begins.

      → **CHECKPOINT A:** I confirm the characterization suite is green and covers the
      behavior we care about preserving.

      ## Phase 3 — Slice (delivery-engine)

      Use the **delivery-engine** skill to break the uplift into atomic slices. Each
      slice must be:

      - **Independently shippable** — a vertical change that stands on its own.
      - **Independently reversible** — it carries its own rollback step. A slice you
        cannot revert without unwinding others is mis-sliced.

      Produce the slice plan with `S/M/L` estimates (mark unreliable ones),
      `depends_on` edges, `done_when` conditions, named unknowns, the critical path,
      and a `rollback` note per slice (borrowed from ops-engine resilience-rollback).

      Write the plan to `./.pipeline/modernize-<target-slug>.md`, where
      `<target-slug>` is a filesystem-safe slug derived from the target (lowercase,
      spaces to `-`, and strip path separators/special characters).

      → **CHECKPOINT B:** I approve the slice plan and its ordering. If I change scope,
      re-slice the affected slices only.

      ## Phase 4 — Uplift per slice (code-quality-engine + ops-engine)

      Work the slices in critical-path order. For each slice:

      1. Apply the smallest change that satisfies `done_when`. The
         **code-quality-engine** rules govern it: **minimal mutation** (no unrelated
         churn), **legacy-safety** (preserve behavior unless a finding explicitly
         fixes a bug), correctness first, no injection/authz/secret regressions.
      2. The characterization suite from Phase 2 must stay green. If a slice changes
         behavior that a characterization test pins, **stop** — that is a behavior
         change, not a refactor; surface it for a decision.
      3. Confirm the slice's `rollback` step is real and would revert just this slice.
      4. Report in caveman `full`:

         ```text
         slice S-0X done
         Δ: <what changed>
         behavior: preserved | changed (<why — needs decision>)
         tests: characterization green | <new test added>
         rollback: <verified revert step>
         next: S-0Y
         ```

      → **CHECKPOINT per slice:** Pause after each shippable slice for review before
      starting the next, unless I tell you to run straight through.

      ## Output

      The uplift summary: slices shipped, behavior preserved vs. intentionally changed,
      the characterization suite status, and any slice deferred. Keep the per-slice
      rollback steps in the summary — they are the safety net if a later slice goes
      wrong.

      ## Stop conditions

      - Current behavior cannot be pinned (the code is non-deterministic or untestable
        as-is) — stop; that is the first problem to solve, not the refactor.
      - A slice cannot be made independently reversible — stop and re-slice; do not
        ship an irreversible step inside an uplift.
      - An uplift slice changes behavior a characterization test pins — stop and flag
        it as a bug fix or feature for a separate decision; do not bundle it silently.
      - A required input is missing — ask one question, then stop.
    vars:
      - name: form1
        type: form
        params:
          layout: |
            Target (module, workflow, or system area):
            [[target]]
            Current coverage: [[coverage]]
            Slicing: [[slicing]]
          fields:
            target:
              multiline: true
            coverage:
              type: 'list'
              values:
                - unknown
                - none
                - partial
            slicing:
              type: 'list'
              values:
                - auto
                - single-slice
