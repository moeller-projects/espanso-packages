# Agent prompt: onboard-repo
# One-time repo onboarding — map the architecture and commit an AGENTS.md so future sessions start with the map already on disk.
# Trigger: :agent-onboard
#
# Espanso is the source of truth for this prompt.
# Run scripts/sync-to-claude-commands.sh to regenerate .claude/commands/onboard-repo.md.

matches:
  - trigger: ':agent-onboard'
    label: 'Onboard repo — generate AGENTS.md from repo scan'
    replace: |
      Filled inputs:
      - output-path: {{form1.output_path}}

      ---

      # Onboard Repo

      Run this once per repo. It scans the codebase with `repo-engine`, hands off to
      `doc-engine`, and produces an `AGENTS.md` at the repo root — a durable map
      every future session (any agent, any prompt) starts from. The payoff
      compounds: every later run skips a repo-scan pass.

      **Caveman:** OFF. The output is a long-lived document; agents and humans both
      read it.

      ## Inputs

      - `output-path` — where the file lands. Default `AGENTS.md` at the repo root.
        Override only when the project already has a convention (e.g.
        `docs/AGENTS.md`).

      ## Phase 0 — Don't clobber

      If an `AGENTS.md` already exists at the output path:

      - Read it. Note when it was last touched (`git log -1 --format=%cd`).
      - If it's recent and substantive, **stop** and offer a diff-merge instead of
        overwrite. The existing one is probably better than a fresh scan.
      - If it's stale or auto-generated boilerplate, proceed but archive the old one
        alongside (`AGENTS.md.old`).

      ## Phase 1 — Scan (repo-engine)

      Use the **repo-engine** skill at full depth. Surface, in this order:

      - **Stack and versions** — language(s), framework(s), runtime, package
        manager. Pin versions from lockfiles, not guessed.
      - **Layout** — top-level dirs and what each holds, two levels deep where
        useful. Omit `node_modules`, `dist`, `target`, `.git`, etc.
      - **Entry points** — every `main`, `index`, `app`, server bootstrap, CLI
        binary, worker, scheduled job. With file paths.
      - **Architecture layers** — modules and how they depend on each other. Note
        the boundary rules the codebase enforces (or doesn't).
      - **Conventions** — naming, error handling, logging, configuration,
        validation, testing. Where the codebase is consistent, state the rule; where
        it isn't, note the inconsistency rather than papering over it.
      - **Build, test, lint commands** — exact strings, not paraphrases.
      - **Hotspots** — files with the highest change frequency or complexity. These
        are where future work concentrates.
      - **Gotchas** — anything a fresh contributor would step on. Migrations in
        progress, half-finished refactors, environment quirks.

      If `repo-engine` can't characterize an area (genuinely inconsistent, or
      generated code), say so — guessing here corrupts every future session.

      ## Phase 2 — Author the doc (doc-engine)

      Use the **doc-engine** skill. Target structure:

      ```text
      # AGENTS.md

      > Map of this repo for AI agents and new contributors. Generated by the
      > `onboard-repo` prompt on YYYY-MM-DD. Regenerate when the layout shifts.

      ## Overview
      One paragraph: what this repo is, who it serves, what it does not contain.

      ## Stack
      - Language: <name + version>
      - Framework: <name + version>
      - Runtime: <name + version>
      - Package manager: <…>
      - Other notable deps: <queue, db driver, auth lib, etc.>

      ## Layout
      ```
      <tree, two levels, with a one-line purpose per dir>
      ```

      ## Entry points
      - `path/to/main` — <what runs here>
      - ...

      ## Architecture
      <two or three paragraphs: how the layers fit, where the boundaries are, the
      direction of dependency. A small diagram if it helps; words are fine too.>

      ## Conventions
      - Testing: <framework, where tests live, how to run>
      - Errors: <pattern>
      - Logging: <pattern>
      - Configuration: <where it comes from, how it's loaded>
      - Naming: <notable rules>

      ## Build, test, run
      ```
      <exact commands>
      ```

      ## Hotspots
      - `path/to/file` — <why it's a hotspot>
      - ...

      ## Gotchas
      - <thing a newcomer breaks first>
      - ...

      ## Where to start
      - Bug? Check `<path>` and `<path>` first.
      - New feature? Most additions land in `<dir>`. The pattern to follow is
        `<example file>`.
      - Refactor? Look at hotspots above; pair with `repo-engine` before touching
        cross-module boundaries.

      ## Related prompts
      - `triage` for incoming requests against this repo.
      - `implement-workitem` for the full pipeline.
      - `review-pr`, `refactor`, `debug-trace` as needed.
      ```

      → **CHECKPOINT:** I review the draft. Correct anything `repo-engine` got wrong
      about conventions — agents will trust this for months.

      ## Phase 3 — Save

      Write to the chosen path. Add to git (`git add AGENTS.md`) but do not commit —
      let me commit alongside any related changes.

      ## Output

      The AGENTS.md path and a one-line summary of what changed vs the previous
      version (or "new file"). Plus the next-step suggestion: now run `triage` or
      `implement-workitem` and notice it skips the repo-scan pass.

      ## Stop conditions

      - Existing AGENTS.md is fresh and human-edited — diff-merge, don't clobber.
      - The repo is so polyglot or so fragmented that one AGENTS.md misrepresents
        it — propose one per top-level area instead, and ask before fanning out.
      - `repo-engine` reports the codebase is mid-migration with two competing
        patterns — document both honestly rather than picking a winner.
    vars:
      - name: form1
        type: form
        params:
          layout: |
            Output path: [[output_path]]
          fields:
            output_path:
              default: 'AGENTS.md'
